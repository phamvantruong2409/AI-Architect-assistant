<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Architect Assistant</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--sidebar:#efefeb;
  --border:rgba(0,0,0,0.09);--border-strong:rgba(0,0,0,0.16);
  --text:#1a1a18;--text2:#6b6b65;--text3:#a0a098;
  --accent:#1a73e8;--accent-bg:#e8f0fe;
  --bubble-ai:#efefeb;--bubble-user:#1a73e8;
  --r:12px;--rs:8px;--sw:232px;
  --danger:#c0392b;--danger-bg:#fdf0ef;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--surface:#252525;--sidebar:#202020;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);
  --text:#f0efe9;--text2:#9a9990;--text3:#5e5e58;
  --accent-bg:#1a2a3e;--bubble-ai:#2c2c2c;
  --danger-bg:#2a1a1a;
}}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;font-size:15px}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--sidebar);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.new-chat-btn{margin:12px 10px 6px;padding:9px 12px;border:0.5px solid var(--border-strong);border-radius:var(--rs);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:7px;font-size:13px;font-family:inherit;transition:background .15s}
.new-chat-btn:hover{background:var(--border)}
.history-label{padding:10px 14px 4px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.history-list{flex:1;overflow-y:auto;padding:0 6px}
.h-item{padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--text2);transition:background .15s;display:flex;align-items:center;justify-content:space-between;gap:6px}
.h-item:hover{background:var(--border);color:var(--text)}
.h-item.active{background:var(--accent-bg);color:var(--accent)}
.h-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-item-del{opacity:0;font-size:13px;color:var(--text3);flex-shrink:0;padding:2px 4px;border-radius:4px;line-height:1}
.h-item:hover .h-item-del{opacity:1}
.h-item-del:hover{color:var(--danger);background:var(--danger-bg)}

/* CONFIRM DIALOG */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--r);padding:22px 24px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.dialog h3{font-size:15px;font-weight:600;margin-bottom:8px}
.dialog p{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:18px}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:7px 16px;border:0.5px solid var(--border-strong);border-radius:var(--rs);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:background .15s}
.btn-cancel:hover{background:var(--border)}
.btn-del{padding:7px 16px;border:none;border-radius:var(--rs);background:var(--danger);color:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:opacity .15s}
.btn-del:hover{opacity:.85}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:50px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;background:var(--surface);flex-shrink:0}
.model-wrap{position:relative}
.model-wrap select{appearance:none;background:transparent;border:0.5px solid var(--border-strong);border-radius:var(--rs);padding:6px 26px 6px 10px;font-size:13px;color:var(--text);cursor:pointer;font-family:inherit}
.model-wrap::after{content:'\ea5f';font-family:tabler-icons;position:absolute;right:7px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:13px}
.topbar-gap{flex:1}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;color:var(--text2)}
.welcome-icon{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a73e8,#0d47a1);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.welcome-icon i{color:#fff;font-size:24px}
.welcome h2{font-size:17px;font-weight:600;color:var(--text)}
.welcome p{font-size:13px;line-height:1.6;max-width:320px;color:var(--text2)}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:10px;max-width:480px}
.chip{padding:7px 14px;border:0.5px solid var(--border-strong);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;text-align:left;line-height:1.4}
.chip:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

.msg{display:flex;gap:9px;max-width:700px;width:100%;margin:0 auto}
.msg.user{flex-direction:row-reverse}
.mavt{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.mavt.ai{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;font-size:13px}
.mavt.user{background:var(--accent);color:#fff}
.mbubble{padding:9px 13px;border-radius:var(--r);font-size:14px;line-height:1.65;max-width:calc(100% - 40px);word-break:break-word}
.msg.ai .mbubble{background:var(--bubble-ai);color:var(--text);border:0.5px solid var(--border)}
.msg.user .mbubble{background:var(--bubble-user);color:#fff}
.mmodel{font-size:10px;color:var(--text3);margin-top:3px}

.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* INPUT */
.input-bar{padding:10px 16px 13px;border-top:0.5px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{max-width:700px;margin:0 auto;display:flex;align-items:flex-end;gap:7px;border:0.5px solid var(--border-strong);border-radius:var(--r);padding:7px 7px 7px 13px;background:var(--bg);transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{flex:1;border:none;background:transparent;resize:none;font-size:14px;line-height:1.5;color:var(--text);outline:none;font-family:inherit;height:24px;max-height:150px;overflow-y:auto}
.input-wrap textarea::placeholder{color:var(--text3)}
.send-btn{width:32px;height:32px;border-radius:7px;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:opacity .15s,transform .1s;flex-shrink:0;font-size:16px}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.hint{max-width:700px;margin:4px auto 0;font-size:11px;color:var(--text3);text-align:center}
</style>
</head>
<body>

<!-- Confirm delete dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <h3>Xoá cuộc trò chuyện?</h3>
    <p>Hành động này không thể hoàn tác. Toàn bộ nội dung cuộc trò chuyện sẽ bị xoá vĩnh viễn.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeDialog()">Huỷ</button>
      <button class="btn-del" onclick="confirmDelete()">Xoá</button>
    </div>
  </div>
</div>

<aside class="sidebar">
  <button class="new-chat-btn" onclick="newChat()"><i class="ti ti-plus"></i> Cuộc trò chuyện mới</button>
  <div class="history-label">Lịch sử</div>
  <div class="history-list" id="history-list"></div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="model-wrap">
      <select id="model-select" onchange="currentModel=this.value">
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
      </select>
    </div>
    <div class="topbar-gap"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="inp" placeholder="Hỏi AI Architect Assistant..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" title="Gửi"><i class="ti ti-arrow-up"></i></button>
    </div>
    <div class="hint">AI có thể mắc lỗi. Luôn kiểm tra với tiêu chuẩn và quy chuẩn xây dựng hiện hành.</div>
  </div>
</main>

<script>
const ML = {'gemini-2.5-pro':'Gemini 2.5 Pro','gemini-2.5-flash':'Gemini 2.5 Flash','gemini-2.0-flash':'Gemini 2.0 Flash','gemini-1.5-pro':'Gemini 1.5 Pro','gemini-1.5-flash':'Gemini 1.5 Flash','gemini-1.0-pro':'Gemini 1.0 Pro'};
let currentModel = 'gemini-2.5-pro';
let isTyping = false;
let history = [];
let activeId = null;
let pendingDeleteId = null;

function saveHistory(){ try{ localStorage.setItem('arch_chat', JSON.stringify(history)); }catch(e){} }
function loadHistory(){ try{ const d=localStorage.getItem('arch_chat'); if(d) history=JSON.parse(d); }catch(e){ history=[]; } }

function renderHistory(){
  const el = document.getElementById('history-list');
  el.innerHTML = '';
  // mới nhất trên đầu: dùng slice().reverse()
  history.slice().reverse().forEach(conv => {
    const d = document.createElement('div');
    d.className = 'h-item' + (conv.id === activeId ? ' active' : '');
    d.innerHTML = `<span class="h-item-title">${escHtml(conv.title)}</span><span class="h-item-del" title="Xoá">✕</span>`;
    d.querySelector('.h-item-title').addEventListener('click', () => loadConv(conv.id));
    d.querySelector('.h-item-del').addEventListener('click', e => { e.stopPropagation(); openDialog(conv.id); });
    el.appendChild(d);
  });
}

function openDialog(id){ pendingDeleteId = id; document.getElementById('overlay').classList.add('show'); }
function closeDialog(){ pendingDeleteId = null; document.getElementById('overlay').classList.remove('show'); }
function confirmDelete(){
  if(!pendingDeleteId) return;
  history = history.filter(c => c.id !== pendingDeleteId);
  if(activeId === pendingDeleteId){ activeId = null; showWelcome(); }
  saveHistory(); renderHistory(); closeDialog();
}

// Close overlay on backdrop click
document.getElementById('overlay').addEventListener('click', e => { if(e.target === e.currentTarget) closeDialog(); });

function loadConv(id){
  const conv = history.find(c => c.id === id);
  if(!conv) return;
  activeId = id;
  renderHistory();
  const chatEl = document.getElementById('chat');
  chatEl.innerHTML = '';
  conv.msgs.forEach(m => renderMsg(m.role, m.text, m.model));
  chatEl.scrollTop = chatEl.scrollHeight;
}

function newChat(){ activeId = null; showWelcome(); renderHistory(); }

function showWelcome(){
  document.getElementById('chat').innerHTML = `
    <div class="welcome">
      <div class="welcome-icon"><i class="ti ti-building-arch"></i></div>
      <h2>Tôi là trợ lý kiến trúc sư<br>AI Architect Assistant</h2>
      <p>Hỏi tôi về thiết kế, kết cấu, quy chuẩn xây dựng, vật liệu và các vấn đề trong thực hành kiến trúc.</p>
      <div class="chips">
        <div class="chip" onclick="quickSend('Quy chuẩn QCVN 06:2022 về phòng cháy chữa cháy cho nhà cao tầng')">🔥 PCCC nhà cao tầng</div>
        <div class="chip" onclick="quickSend('Tính toán diện tích thông thủy và cách bố trí mặt bằng căn hộ 65m²')">📐 Bố trí mặt bằng căn hộ</div>
        <div class="chip" onclick="quickSend('So sánh kết cấu khung thép và bê tông cốt thép cho nhà xưởng công nghiệp')">🏗️ Thép vs BTCT nhà xưởng</div>
        <div class="chip" onclick="quickSend('Tiêu chuẩn chiếu sáng tự nhiên và thông gió cho văn phòng theo TCVN')">💡 Chiếu sáng & thông gió VP</div>
        <div class="chip" onclick="quickSend('Hướng dẫn đọc và kiểm tra hồ sơ thiết kế xây dựng')">📋 Kiểm tra hồ sơ thiết kế</div>
        <div class="chip" onclick="quickSend('Các lỗi thường gặp trong bản vẽ thi công và cách khắc phục')">⚠️ Lỗi bản vẽ thi công</div>
      </div>
    </div>`;
}

function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatText(text){
  return text
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => `<pre style="background:rgba(0,0,0,0.06);padding:10px;border-radius:6px;font-size:12px;margin:6px 0;overflow-x:auto"><code>${escHtml(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_,c) => `<code style="background:rgba(0,0,0,0.06);padding:2px 5px;border-radius:4px;font-size:12px">${escHtml(c)}</code>`)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function renderMsg(role, text, model){
  const chatEl = document.getElementById('chat');
  const w = document.querySelector('.welcome'); if(w) w.remove();
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const ava = role === 'ai' ? '<i class="ti ti-building-arch" style="font-size:13px"></i>' : 'U';
  const mTag = role === 'ai' ? `<div class="mmodel">${ML[model||currentModel]}</div>` : '';
  d.innerHTML = `<div class="mavt ${role}">${ava}</div><div><div class="mbubble">${formatText(text)}</div>${mTag}</div>`;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping(){
  const w = document.querySelector('.welcome'); if(w) w.remove();
  const chatEl = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = `<div class="mavt ai"><i class="ti ti-building-arch" style="font-size:13px"></i></div><div class="mbubble" style="padding:11px 13px"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}

const DR = {
  default: [
    "Đây là vấn đề thường gặp trong thực hành kiến trúc. Hãy để tôi phân tích chi tiết hơn cho bạn.",
    "Theo kinh nghiệm thiết kế và các tiêu chuẩn hiện hành, đây là những điểm cần lưu ý.",
    "Câu hỏi hay! Trong kiến trúc và xây dựng, vấn đề này cần xem xét từ nhiều góc độ.",
  ],
  pccc: "Theo **QCVN 06:2022/BXD** về An toàn cháy:\n\n**Nhà cao tầng (>28m):**\n- Bậc chịu lửa tối thiểu: bậc I\n- Cầu thang thoát nạn: buồng thang kín, áp suất dương\n- Khoảng cách đến lối thoát nạn: ≤ 40m\n- Hệ thống sprinkler: bắt buộc từ tầng 4 trở lên\n- Lối tiếp cận xe chữa cháy: rộng ≥ 4m, khoảng cách đến công trình 5–15m\n\n**Lưu ý:** Cần kiểm tra thêm với TCVN 3890:2023 và yêu cầu cụ thể của địa phương.",
  matbang: "Nguyên tắc bố trí mặt bằng căn hộ **65m² thông thủy**:\n\n**Phân bổ diện tích gợi ý:**\n- Phòng khách + bếp liên thông: 22–25m²\n- Phòng ngủ chính: 12–14m²\n- Phòng ngủ 2: 9–10m²\n- WC (2 phòng): 6–8m²\n- Hành lang + ban công: 5–7m²\n\n**Nguyên tắc thiết kế:**\n- Phân vùng rõ: công cộng (khách/bếp) – riêng tư (phòng ngủ)\n- Cửa sổ phòng ngủ hướng Đông/Đông-Nam\n- Bếp thông thoáng, tránh hướng Tây\n- Hành lang tối thiểu rộng 1.0m",
};

function getReply(text){
  const t = text.toLowerCase();
  if(t.includes('pccc')||t.includes('phòng cháy')||t.includes('chữa cháy')||t.includes('sprinkler')) return DR.pccc;
  if(t.includes('mặt bằng')||t.includes('căn hộ')||t.includes('diện tích')||t.includes('bố trí')) return DR.matbang;
  return DR.default[Math.floor(Math.random()*DR.default.length)];
}

async function send(text){
  if(!text||isTyping) return;
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  if(!activeId){
    const id = 'c'+Date.now();
    const title = text.slice(0,38)+(text.length>38?'…':'');
    history.push({id, title, msgs:[]});
    activeId = id;
  }
  const conv = history.find(c=>c.id===activeId);
  conv.msgs.push({role:'user', text});
  renderMsg('user', text);
  renderHistory();
  addTyping();
  await new Promise(r=>setTimeout(r, 800+Math.random()*700));
  document.getElementById('typing')?.remove();
  const reply = getReply(text);
  const model = currentModel;
  conv.msgs.push({role:'ai', text:reply, model});
  saveHistory();
  renderMsg('ai', reply, model);
  renderHistory();
  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('inp').focus();
}

function quickSend(text){ document.getElementById('inp').value=text; doSend(); }

function doSend(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='24px'; send(text);
}

const inp=document.getElementById('inp');
inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();} });
inp.addEventListener('input', ()=>{ inp.style.height='24px'; inp.style.height=Math.min(inp.scrollHeight,150)+'px'; });
document.getElementById('send-btn').addEventListener('click', doSend);

loadHistory(); showWelcome(); renderHistory(); inp.focus();
</script>
</body>
</html>
