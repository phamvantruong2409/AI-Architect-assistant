<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptCard | Payment not completed</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #171312;
        --bg-2: #39211a;
        --bg-3: #0d1014;
        --border: rgba(255,255,255,0.12);
        --text: rgba(250,247,243,0.96);
        --muted: rgba(239,231,223,0.74);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 111, 18, 0.26), transparent 28%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2) 44%, var(--bg-3));
      }
      .shell {
        width: min(100%, 640px);
        border-radius: 30px;
        padding: 34px;
        background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.03)), rgba(14, 12, 14, 0.42);
        border: 1px solid var(--border);
        box-shadow: 0 28px 60px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
        backdrop-filter: blur(28px) saturate(1.08);
        -webkit-backdrop-filter: blur(28px) saturate(1.08);
      }
      .eyebrow {
        display: inline-flex;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.05);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: clamp(34px, 5vw, 50px);
        line-height: 1.03;
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        font-size: 18px;
        line-height: 1.7;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <span class="eyebrow">PromptCard credits</span>
      <h1>Payment was not completed.</h1>
      <p>No credits were added.</p>
    </main>
  </body>
</html>
